<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
{{ with .OutputFormats.Get "rss" -}}
<link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ $.Site.Title }}">
{{- end }}
<style>
:root {
  --bg: #ffffff;
  --fg: #1c1c1c;
  --muted: #757575;
  --link: #0b5cc4;
  --rule: #e6e6e6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #131313;
    --fg: #d6d6d6;
    --muted: #8a8a8a;
    --link: #82aaf0;
    --rule: #2b2b2b;
  }
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0 auto;
  max-width: 42rem;
  padding: 3.5rem 1.5rem 5rem;
  background: var(--bg);
  color: var(--fg);
  font: 16px/1.75 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
h1, h2, h3 { line-height: 1.3; }
h1 { font-size: 1.4rem; margin: 0 0 1.5rem; }
h2 { font-size: 1.1rem; margin: 2rem 0 0.5rem; }
code, pre, .mono {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.9em;
}
pre {
  padding: 0.9rem 1rem;
  overflow-x: auto;
  border: 1px solid var(--rule);
  border-radius: 6px;
  line-height: 1.5;
}
img { max-width: 100%; }
hr { border: 0; border-top: 1px solid var(--rule); margin: 2.5rem 0; }
blockquote { margin: 0; padding-left: 1rem; border-left: 3px solid var(--rule); color: var(--muted); }

header.site {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3.5rem;
}
header.site .name { font-weight: 600; color: var(--fg); }
header.site nav a { color: var(--muted); margin-left: 1.1rem; }
header.site nav a:hover { color: var(--link); text-decoration: none; }
header.site, footer.site { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.85rem; }

ul.posts { list-style: none; padding: 0; margin: 0; }
ul.posts li {
  display: flex;
  gap: 1.25rem;
  align-items: baseline;
  padding: 0.3rem 0;
}
ul.posts time {
  color: var(--muted);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.8rem;
  flex-shrink: 0;
}
.post-meta {
  color: var(--muted);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.8rem;
  margin: -1rem 0 2rem;
}
footer.site {
  margin-top: 5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--rule);
  color: var(--muted);
}
footer.site a { color: var(--muted); }
footer.site a:hover { color: var(--link); }
</style>
</head>
<body>
<header class="site">
  <a class="name" href="/">octoarden</a>
  <nav>
    <a href="/">about</a>
    <a href="/writing/">writing</a>
  </nav>
</header>
<main>
{{ block "main" . }}{{ end }}
</main>
<footer class="site">
  <a href="https://github.com/octoarden">github</a> ·
  <a href="https://x.com/octoarden">x</a> ·
  <a href="mailto:octoarden@gmail.com">email</a> ·
  <a href="/index.xml">rss</a>
</footer>
</body>
</html>
